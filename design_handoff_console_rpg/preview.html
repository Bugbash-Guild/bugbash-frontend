<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<title>Direction A · Console RPG — preview</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  html,body{margin:0;padding:0;background:#0b0f0d;color:#dcefe5;font-family:'JetBrains Mono',monospace;}
  *{box-sizing:border-box;}
  .tabs{
    display:flex;gap:4px;padding:12px 16px;
    background:#101614;border-bottom:1px solid #1f2a26;
    position:sticky;top:0;z-index:10;
  }
  .tab{
    padding:8px 14px;border-radius:4px;
    font:600 12px/1 'JetBrains Mono',monospace;letter-spacing:0.04em;
    color:#7a9c8c;background:transparent;border:1px solid #1f2a26;cursor:pointer;
  }
  .tab.active{color:#7ee787;background:rgba(126,231,135,0.08);border-color:rgba(126,231,135,0.4);}
  .frame{display:flex;justify-content:center;padding:20px;}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="reference/mock-data.js"></script>
<script type="text/babel" src="reference/dirA.jsx"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const {useState} = React;
function App() {
  const [s, setS] = useState('home');
  const tabs = [
    {k:'home', l:'~/home'},
    {k:'monsters', l:'~/monsters'},
    {k:'items', l:'~/items'},
    {k:'login', l:'~/login'},
  ];
  return (
    <div>
      <div className="tabs">
        {tabs.map(t=>(
          <button key={t.k} className={'tab'+(s===t.k?' active':'')} onClick={()=>setS(t.k)}>{t.l}</button>
        ))}
      </div>
      <div className="frame">
        <div style={{boxShadow:'0 20px 60px rgba(0,0,0,0.6)', borderRadius:8, overflow:'hidden'}}>
          <ADirection screen={s}/>
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
